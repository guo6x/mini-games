<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烹饪游戏 - 小游戏大全</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .game-area {
            width: 600px;
            height: 400px;
            margin: 20px auto;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2em;
            position: relative;
        }
        .controls {
            margin: 20px 0;
        }
        .game-btn {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1.1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .start-btn {
            background: #2ecc71;
            color: white;
        }
        .start-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-box {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">🏠 首页</a>
        <a href="#" class="active">👨‍🍳 烹饪游戏</a>
    </nav>
    
    <div class="game-container">
        <h1>👨‍🍳 烹饪游戏</h1>
        
        <div class="stats">
            <div class="stat-box">
                <div>得分</div>
                <div id="score">0</div>
            </div>
            <div class="stat-box">
                <div>等级</div>
                <div id="level">1</div>
            </div>
            <div class="stat-box">
                <div>时间</div>
                <div id="time">0</div>
            </div>
        </div>
        
        <div class="game-area" id="game-area">
            <div>点击开始游戏</div>
        </div>
        
        <div class="controls">
            <button onclick="startGame()" class="game-btn start-btn" id="start-btn">开始游戏</button>
            <button onclick="resetGame()" class="game-btn">重新开始</button>
            <button onclick="window.location.href='index.html'" class="game-btn">返回首页</button>
        </div>
    </div>
    
    <script>
        class CookingGame {
            constructor() {
                this.score = 0;
                this.level = 1;
                this.gameActive = false;
                this.startTime = 0;
                this.currentRecipe = null;
                this.ingredients = [];
                this.cookingTime = 0;
                this.maxCookingTime = 30;
                this.gameTimer = null;
                
                this.recipes = [
                    { name: '番茄炒蛋', ingredients: ['🍅', '🥚', '🧄'], time: 15, points: 100 },
                    { name: '宫保鸡丁', ingredients: ['🐔', '🥜', '🌶️'], time: 20, points: 150 },
                    { name: '红烧肉', ingredients: ['🥩', '🧅', '🍯'], time: 25, points: 200 },
                    { name: '麻婆豆腐', ingredients: ['🧈', '🌶️', '🧄'], time: 18, points: 120 },
                    { name: '糖醋里脊', ingredients: ['🥩', '🍯', '🍅'], time: 22, points: 180 }
                ];
                
                this.availableIngredients = ['🍅', '🥚', '🧄', '🐔', '🥜', '🌶️', '🥩', '🧅', '🍯', '🧈', '🥕', '🥬'];
            }
            
            startGame() {
                this.gameActive = true;
                this.startTime = Date.now();
                this.score = 0;
                this.level = 1;
                this.cookingTime = 0;
                
                document.getElementById('start-btn').textContent = '游戏中...';
                document.getElementById('start-btn').disabled = true;
                
                this.generateRecipe();
                this.updateStats();
                this.startTimer();
            }
            
            generateRecipe() {
                this.currentRecipe = this.recipes[Math.floor(Math.random() * this.recipes.length)];
                this.ingredients = [];
                this.cookingTime = 0;
                this.maxCookingTime = this.currentRecipe.time;
                
                const gameArea = document.getElementById('game-area');
                gameArea.innerHTML = `
                    <div style="color: white; text-align: center;">
                        <h3>制作: ${this.currentRecipe.name}</h3>
                        <p>需要食材: ${this.currentRecipe.ingredients.join(' ')}</p>
                        <div style="margin: 20px 0;">
                            <div>已选食材: <span id="selected-ingredients"></span></div>
                            <div>烹饪时间: <span id="cooking-time">${this.cookingTime}</span>/${this.maxCookingTime}s</div>
                        </div>
                        <div id="ingredient-buttons" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0;">
                            ${this.availableIngredients.map(ing => 
                                `<button onclick="game.selectIngredient('${ing}')" style="padding: 10px; font-size: 20px; border: none; border-radius: 5px; cursor: pointer;">${ing}</button>`
                            ).join('')}
                        </div>
                        <button onclick="game.startCooking()" id="cook-btn" style="padding: 10px 20px; font-size: 16px; background: #ff6b35; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 10px;">开始烹饪</button>
                        <button onclick="game.serveDish()" id="serve-btn" style="padding: 10px 20px; font-size: 16px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 10px;" disabled>上菜</button>
                    </div>
                `;
                
                this.updateIngredientDisplay();
            }
            
            selectIngredient(ingredient) {
                if (!this.gameActive || this.cookingTime > 0) return;
                
                if (this.ingredients.length < 3) {
                    this.ingredients.push(ingredient);
                    this.updateIngredientDisplay();
                }
            }
            
            updateIngredientDisplay() {
                const display = document.getElementById('selected-ingredients');
                if (display) {
                    display.textContent = this.ingredients.join(' ');
                }
            }
            
            startCooking() {
                if (this.ingredients.length === 0) return;
                
                document.getElementById('cook-btn').disabled = true;
                this.cookingTimer = setInterval(() => {
                    this.cookingTime++;
                    document.getElementById('cooking-time').textContent = this.cookingTime;
                    
                    if (this.cookingTime >= this.maxCookingTime) {
                        document.getElementById('serve-btn').disabled = false;
                    }
                    
                    if (this.cookingTime > this.maxCookingTime + 5) {
                        // 烹饪过度
                        this.finishCooking(false);
                    }
                }, 1000);
            }
            
            serveDish() {
                this.finishCooking(true);
            }
            
            finishCooking(served) {
                clearInterval(this.cookingTimer);
                
                let success = false;
                let points = 0;
                
                if (served && this.cookingTime >= this.maxCookingTime && this.cookingTime <= this.maxCookingTime + 3) {
                    // 检查食材是否正确
                    const correctIngredients = this.currentRecipe.ingredients.every(ing => this.ingredients.includes(ing));
                    if (correctIngredients && this.ingredients.length === this.currentRecipe.ingredients.length) {
                        success = true;
                        points = this.currentRecipe.points;
                        this.score += points;
                    }
                }
                
                const gameArea = document.getElementById('game-area');
                gameArea.innerHTML = `
                    <div style="color: white; text-align: center;">
                        <h3>${success ? '✅ 烹饪成功!' : '❌ 烹饪失败!'}</h3>
                        <p>${success ? `获得 ${points} 分!` : '食材错误或时间不当'}</p>
                        <button onclick="game.nextLevel()" style="padding: 10px 20px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 10px;">下一道菜</button>
                    </div>
                `;
                
                if (success) {
                    this.level++;
                }
                
                this.updateStats();
            }
            
            nextLevel() {
                this.generateRecipe();
            }
            
            resetGame() {
                this.gameActive = false;
                this.score = 0;
                this.level = 1;
                this.startTime = 0;
                
                if (this.gameTimer) clearInterval(this.gameTimer);
                if (this.cookingTimer) clearInterval(this.cookingTimer);
                
                document.getElementById('start-btn').textContent = '开始游戏';
                document.getElementById('start-btn').disabled = false;
                document.getElementById('game-area').innerHTML = '<div>点击开始游戏</div>';
                
                this.updateStats();
            }
            
            startTimer() {
                this.gameTimer = setInterval(() => {
                    if (this.gameActive) {
                        this.updateStats();
                    }
                }, 1000);
            }
            
            updateStats() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                
                const timeElapsed = this.gameActive ? Math.floor((Date.now() - this.startTime) / 1000) : 0;
                document.getElementById('time').textContent = timeElapsed + 's';
            }
        }
        
        const game = new CookingGame();
        
        function startGame() {
            game.startGame();
        }
        
        function resetGame() {
            game.resetGame();
        }
        
        console.log('烹饪游戏 已加载');
    </script>
</body>
</html>
