<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>换装游戏 - 小游戏大全</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .game-area {
            width: 800px;
            height: 500px;
            margin: 20px auto;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
            display: flex;
            position: relative;
            overflow: hidden;
        }
        .character-area {
            width: 300px;
            height: 100%;
            background: #fff;
            border-right: 2px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .character {
            width: 200px;
            height: 300px;
            background: #f0f0f0;
            border: 2px solid #333;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }
        .character-part {
            position: absolute;
            transition: all 0.3s ease;
        }
        .head {
            width: 60px;
            height: 60px;
            background: #ffdbac;
            border-radius: 50%;
            top: 10px;
            left: 70px;
            border: 2px solid #333;
        }
        .body {
            width: 80px;
            height: 100px;
            background: #e0e0e0;
            top: 80px;
            left: 60px;
            border: 2px solid #333;
        }
        .clothing-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .clothing-category {
            margin-bottom: 20px;
        }
        .clothing-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .clothing-item {
            width: 60px;
            height: 60px;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .clothing-item:hover {
            border-color: #007bff;
            transform: scale(1.1);
        }
        .clothing-item.selected {
            border-color: #28a745;
            background: #d4edda;
        }
        .tops { background: #ffcccb; }
        .bottoms { background: #add8e6; }
        .shoes { background: #dda0dd; }
        .accessories { background: #f0e68c; }
        .controls {
            margin: 20px 0;
        }
        .game-btn {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1.1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .start-btn {
            background: #2ecc71;
            color: white;
        }
        .start-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-box {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">🏠 首页</a>
        <a href="#" class="active">👗 换装游戏</a>
    </nav>
    
    <div class="game-container">
        <h1>👗 换装游戏</h1>
        
        <div class="stats">
            <div class="stat-box">
                <div>得分</div>
                <div id="score">0</div>
            </div>
            <div class="stat-box">
                <div>等级</div>
                <div id="level">1</div>
            </div>
            <div class="stat-box">
                <div>时间</div>
                <div id="time">0</div>
            </div>
        </div>
        
        <div class="game-area" id="game-area">
            <div class="character-area">
                <div class="character" id="character">
                    <div class="character-part head" id="head"></div>
                    <div class="character-part body" id="body"></div>
                    <div class="character-part top" id="top"></div>
                    <div class="character-part bottom" id="bottom"></div>
                    <div class="character-part shoes" id="shoes"></div>
                    <div class="character-part accessory" id="accessory"></div>
                </div>
            </div>
            <div class="clothing-area">
                <div class="clothing-category">
                    <h4>上衣</h4>
                    <div class="clothing-items" id="topsItems"></div>
                </div>
                <div class="clothing-category">
                    <h4>下装</h4>
                    <div class="clothing-items" id="bottomsItems"></div>
                </div>
                <div class="clothing-category">
                    <h4>鞋子</h4>
                    <div class="clothing-items" id="shoesItems"></div>
                </div>
                <div class="clothing-category">
                    <h4>配饰</h4>
                    <div class="clothing-items" id="accessoriesItems"></div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="startGame()" class="game-btn start-btn" id="start-btn">开始游戏</button>
            <button onclick="resetGame()" class="game-btn">重新开始</button>
            <button onclick="window.location.href='index.html'" class="game-btn">返回首页</button>
        </div>
    </div>
    
    <script>
        let score = 0;
        let level = 1;
        let gameActive = false;
        let startTime = 0;
        
        class DressUpGame {
            constructor() {
                this.score = 0;
                this.level = 1;
                this.timeLeft = 300;
                this.gameRunning = false;
                this.currentOutfit = {
                    top: null,
                    bottom: null,
                    shoes: null,
                    accessory: null
                };
                this.clothingData = {
                    tops: [
                        { id: 'top1', name: 'T恤', color: '#ff6b6b', style: 'casual' },
                        { id: 'top2', name: '衬衫', color: '#4ecdc4', style: 'formal' },
                        { id: 'top3', name: '毛衣', color: '#45b7d1', style: 'warm' },
                        { id: 'top4', name: '夹克', color: '#f9ca24', style: 'cool' }
                    ],
                    bottoms: [
                        { id: 'bottom1', name: '牛仔裤', color: '#3742fa', style: 'casual' },
                        { id: 'bottom2', name: '短裙', color: '#ff9ff3', style: 'cute' },
                        { id: 'bottom3', name: '西裤', color: '#2f3542', style: 'formal' },
                        { id: 'bottom4', name: '运动裤', color: '#57606f', style: 'sport' }
                    ],
                    shoes: [
                        { id: 'shoes1', name: '运动鞋', color: '#ffffff', style: 'sport' },
                        { id: 'shoes2', name: '高跟鞋', color: '#000000', style: 'formal' },
                        { id: 'shoes3', name: '靴子', color: '#8b4513', style: 'cool' },
                        { id: 'shoes4', name: '凉鞋', color: '#ffa502', style: 'casual' }
                    ],
                    accessories: [
                        { id: 'acc1', name: '帽子', color: '#ff6348', style: 'casual' },
                        { id: 'acc2', name: '眼镜', color: '#2ed573', style: 'smart' },
                        { id: 'acc3', name: '项链', color: '#ffd700', style: 'elegant' },
                        { id: 'acc4', name: '手表', color: '#c0392b', style: 'formal' }
                    ]
                };
                this.init();
            }

            init() {
                this.createClothingItems();
                this.updateDisplay();
            }

            createClothingItems() {
                Object.keys(this.clothingData).forEach(category => {
                    const container = document.getElementById(category + 'Items');
                    container.innerHTML = '';
                    
                    this.clothingData[category].forEach(item => {
                        const itemElement = document.createElement('div');
                        itemElement.className = `clothing-item ${category.slice(0, -1)}`;
                        itemElement.dataset.itemId = item.id;
                        itemElement.dataset.category = category.slice(0, -1);
                        itemElement.style.backgroundColor = item.color;
                        itemElement.textContent = item.name;
                        
                        itemElement.addEventListener('click', () => {
                            this.selectClothing(category.slice(0, -1), item);
                        });
                        
                        container.appendChild(itemElement);
                    });
                });
            }

            selectClothing(category, item) {
                // 移除之前选中的样式
                document.querySelectorAll(`.clothing-item[data-category="${category}"]`).forEach(el => {
                    el.classList.remove('selected');
                });
                
                // 添加选中样式
                document.querySelector(`[data-item-id="${item.id}"]`).classList.add('selected');
                
                // 更新角色外观
                this.currentOutfit[category] = item;
                this.updateCharacterAppearance(category, item);
                
                // 更新分数
                this.score += 10;
                this.updateDisplay();
            }

            updateCharacterAppearance(category, item) {
                const characterPart = document.getElementById(category === 'top' ? 'top' : category === 'bottom' ? 'bottom' : category);
                
                if (characterPart) {
                    characterPart.style.backgroundColor = item.color;
                    characterPart.style.display = 'block';
                    
                    // 设置不同部位的位置和大小
                    switch(category) {
                        case 'top':
                            characterPart.style.width = '90px';
                            characterPart.style.height = '60px';
                            characterPart.style.top = '75px';
                            characterPart.style.left = '55px';
                            characterPart.style.border = '2px solid #333';
                            break;
                        case 'bottom':
                            characterPart.style.width = '85px';
                            characterPart.style.height = '80px';
                            characterPart.style.top = '140px';
                            characterPart.style.left = '57px';
                            characterPart.style.border = '2px solid #333';
                            break;
                        case 'shoes':
                            characterPart.style.width = '80px';
                            characterPart.style.height = '25px';
                            characterPart.style.top = '225px';
                            characterPart.style.left = '60px';
                            characterPart.style.border = '2px solid #333';
                            characterPart.style.borderRadius = '10px';
                            break;
                        case 'accessory':
                            characterPart.style.width = '70px';
                            characterPart.style.height = '20px';
                            characterPart.style.top = '5px';
                            characterPart.style.left = '65px';
                            characterPart.style.border = '2px solid #333';
                            characterPart.style.borderRadius = '10px';
                            break;
                    }
                }
            }

            checkOutfitCompletion() {
                const completedParts = Object.values(this.currentOutfit).filter(item => item !== null).length;
                if (completedParts >= 3) {
                    this.score += 50;
                    this.level++;
                    this.updateDisplay();
                    alert('搭配完成！获得额外奖励！');
                }
            }

            updateDisplay() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                
                const timeElapsed = this.gameRunning ? Math.floor((Date.now() - this.startTime) / 1000) : 0;
                document.getElementById('time').textContent = timeElapsed + 's';
            }
        }
        
        let game;
        
        function startGame() {
            if (!game) {
                game = new DressUpGame();
            }
            game.gameRunning = true;
            game.startTime = Date.now();
            
            document.getElementById('start-btn').textContent = '游戏中...';
            document.getElementById('start-btn').disabled = true;
            
            game.updateDisplay();
        }
        
        function resetGame() {
            if (game) {
                game.score = 0;
                game.level = 1;
                game.startTime = 0;
                game.gameRunning = false;
                game.currentOutfit = {
                    top: null,
                    bottom: null,
                    shoes: null,
                    accessory: null
                };
                
                // 重置角色外观
                ['top', 'bottom', 'shoes', 'accessory'].forEach(part => {
                    const element = document.getElementById(part);
                    if (element) {
                        element.style.display = 'none';
                    }
                });
                
                // 移除所有选中状态
                document.querySelectorAll('.clothing-item').forEach(item => {
                    item.classList.remove('selected');
                });
                
                game.updateDisplay();
            }
            
            document.getElementById('start-btn').textContent = '开始游戏';
            document.getElementById('start-btn').disabled = false;
        }
        
        function updateStats() {
            if (game) {
                game.updateDisplay();
            }
        }
        
        // 定时更新时间显示
        setInterval(() => {
            if (game && game.gameRunning) {
                updateStats();
            }
        }, 1000);
        
        // 游戏特定逻辑可以在这里添加
        console.log('换装游戏 已加载');
    </script>
</body>
</html>
