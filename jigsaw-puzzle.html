<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼图游戏 - 小游戏大全</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .game-area {
            width: 600px;
            height: 400px;
            margin: 20px auto;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5em;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
        }
        .puzzle-container {
            display: grid;
            gap: 2px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
        }
        .puzzle-piece {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }
        .puzzle-piece:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .puzzle-piece.empty {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.5);
            color: transparent;
        }
        .puzzle-piece.correct {
            background: #2ecc71;
            color: white;
        }
        .difficulty-selector {
            margin-bottom: 20px;
        }
        .difficulty-btn {
            padding: 8px 16px;
            margin: 0 5px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .difficulty-btn:hover, .difficulty-btn.active {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .moves-counter {
            margin-top: 15px;
            font-size: 1.1em;
            color: white;
        }
        .controls {
            margin: 20px 0;
        }
        .game-btn {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1.1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .start-btn {
            background: #2ecc71;
            color: white;
        }
        .start-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-box {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">🏠 首页</a>
        <a href="#" class="active">🧩 拼图游戏</a>
    </nav>
    
    <div class="game-container">
        <h1>🧩 拼图游戏</h1>
        
        <div class="stats">
            <div class="stat-box">
                <div>得分</div>
                <div id="score">0</div>
            </div>
            <div class="stat-box">
                <div>等级</div>
                <div id="level">1</div>
            </div>
            <div class="stat-box">
                <div>时间</div>
                <div id="time">0</div>
            </div>
        </div>
        
        <div class="game-area" id="game-area">
            <div>点击开始游戏</div>
        </div>
        
        <div class="controls">
            <button onclick="startGame()" class="game-btn start-btn" id="start-btn">开始游戏</button>
            <button onclick="resetGame()" class="game-btn">重新开始</button>
            <button onclick="window.location.href='index.html'" class="game-btn">返回首页</button>
        </div>
    </div>
    
    <script>
        let score = 0;
        let level = 1;
        let gameActive = false;
        let startTime = 0;
        
        class JigsawPuzzle {
            constructor() {
                this.score = 0;
                this.level = 1;
                this.moves = 0;
                this.gameActive = false;
                this.gridSize = 3; // 默认3x3
                this.puzzle = [];
                this.emptyIndex = 0;
                this.targetPuzzle = [];
            }

            init(size = 3) {
                this.gridSize = size;
                this.moves = 0;
                this.createPuzzle();
                this.shuffle();
                this.render();
            }

            createPuzzle() {
                const totalPieces = this.gridSize * this.gridSize;
                this.puzzle = [];
                this.targetPuzzle = [];
                
                for (let i = 0; i < totalPieces - 1; i++) {
                    this.puzzle.push(i + 1);
                    this.targetPuzzle.push(i + 1);
                }
                this.puzzle.push(0); // 空格
                this.targetPuzzle.push(0);
                this.emptyIndex = totalPieces - 1;
            }

            shuffle() {
                // 进行1000次随机移动来打乱拼图
                for (let i = 0; i < 1000; i++) {
                    const validMoves = this.getValidMoves();
                    if (validMoves.length > 0) {
                        const randomMove = validMoves[Math.floor(Math.random() * validMoves.length)];
                        this.movePiece(randomMove, false); // false表示不计入移动次数
                    }
                }
                this.moves = 0; // 重置移动次数
            }

            getValidMoves() {
                const moves = [];
                const row = Math.floor(this.emptyIndex / this.gridSize);
                const col = this.emptyIndex % this.gridSize;

                // 上
                if (row > 0) moves.push(this.emptyIndex - this.gridSize);
                // 下
                if (row < this.gridSize - 1) moves.push(this.emptyIndex + this.gridSize);
                // 左
                if (col > 0) moves.push(this.emptyIndex - 1);
                // 右
                if (col < this.gridSize - 1) moves.push(this.emptyIndex + 1);

                return moves;
            }

            movePiece(index, countMove = true) {
                const validMoves = this.getValidMoves();
                if (validMoves.includes(index)) {
                    // 交换空格和选中的拼图块
                    [this.puzzle[this.emptyIndex], this.puzzle[index]] = [this.puzzle[index], this.puzzle[this.emptyIndex]];
                    this.emptyIndex = index;
                    
                    if (countMove) {
                        this.moves++;
                        this.updateStats();
                    }
                    
                    this.render();
                    
                    if (this.checkWin()) {
                        this.win();
                    }
                }
            }

            checkWin() {
                for (let i = 0; i < this.puzzle.length; i++) {
                    if (this.puzzle[i] !== this.targetPuzzle[i]) {
                        return false;
                    }
                }
                return true;
            }

            win() {
                this.gameActive = false;
                const baseScore = this.gridSize * this.gridSize * 10;
                const moveBonus = Math.max(0, baseScore - this.moves);
                this.score += baseScore + moveBonus;
                this.level++;
                
                setTimeout(() => {
                    const gameArea = document.getElementById('game-area');
                    gameArea.innerHTML = `
                        <div style="text-align: center;">
                            <div style="font-size: 2em; margin-bottom: 20px;">🎉 恭喜完成！</div>
                            <div style="font-size: 1.2em; margin-bottom: 10px;">移动次数: ${this.moves}</div>
                            <div style="font-size: 1.2em; margin-bottom: 20px;">获得分数: ${baseScore + moveBonus}</div>
                            <div class="difficulty-selector">
                                <div style="margin-bottom: 10px;">选择难度：</div>
                                <button class="difficulty-btn" onclick="jigsawPuzzle.startNewGame(3)">简单 (3x3)</button>
                                <button class="difficulty-btn" onclick="jigsawPuzzle.startNewGame(4)">中等 (4x4)</button>
                                <button class="difficulty-btn" onclick="jigsawPuzzle.startNewGame(5)">困难 (5x5)</button>
                            </div>
                        </div>
                    `;
                }, 1000);
                
                this.updateStats();
            }

            startNewGame(size) {
                this.gameActive = true;
                this.init(size);
                document.getElementById('start-btn').textContent = '游戏中...';
                document.getElementById('start-btn').disabled = true;
            }

            render() {
                const gameArea = document.getElementById('game-area');
                const puzzleHtml = `
                    <div>
                        <div class="puzzle-container" style="grid-template-columns: repeat(${this.gridSize}, 1fr);">
                            ${this.puzzle.map((piece, index) => 
                                `<div class="puzzle-piece ${piece === 0 ? 'empty' : ''}" 
                                      onclick="jigsawPuzzle.movePiece(${index})">
                                    ${piece === 0 ? '' : piece}
                                </div>`
                            ).join('')}
                        </div>
                        <div class="moves-counter">移动次数: ${this.moves}</div>
                    </div>
                `;
                gameArea.innerHTML = puzzleHtml;
            }

            updateStats() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
            }
        }

        let jigsawPuzzle;

        function startGame() {
            if (!jigsawPuzzle) {
                jigsawPuzzle = new JigsawPuzzle();
            }
            
            gameActive = true;
            startTime = Date.now();
            
            // 显示难度选择
            const gameArea = document.getElementById('game-area');
            gameArea.innerHTML = `
                <div style="text-align: center;">
                    <div style="font-size: 1.5em; margin-bottom: 20px;">选择难度</div>
                    <div class="difficulty-selector">
                        <button class="difficulty-btn" onclick="jigsawPuzzle.startNewGame(3)">简单 (3x3)</button>
                        <button class="difficulty-btn" onclick="jigsawPuzzle.startNewGame(4)">中等 (4x4)</button>
                        <button class="difficulty-btn" onclick="jigsawPuzzle.startNewGame(5)">困难 (5x5)</button>
                    </div>
                    <div style="margin-top: 20px; font-size: 0.9em; color: rgba(255,255,255,0.8);">
                        点击数字块移动到空白位置，按顺序排列所有数字
                    </div>
                </div>
            `;
            
            document.getElementById('start-btn').textContent = '选择难度...';
            document.getElementById('start-btn').disabled = true;
            
            score = jigsawPuzzle.score;
            level = jigsawPuzzle.level;
            
            updateStats();
        }
        
        function resetGame() {
            gameActive = false;
            score = 0;
            level = 1;
            startTime = 0;
            
            document.getElementById('start-btn').textContent = '开始游戏';
            document.getElementById('start-btn').disabled = false;
            document.getElementById('game-area').innerHTML = '<div>点击开始游戏</div>';
            
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            
            const timeElapsed = gameActive ? Math.floor((Date.now() - startTime) / 1000) : 0;
            document.getElementById('time').textContent = timeElapsed + 's';
        }
        
        // 定时更新时间显示
        setInterval(() => {
            if (gameActive) {
                updateStats();
            }
        }, 1000);
        
        // 游戏特定逻辑可以在这里添加
        console.log('拼图游戏 已加载');
    </script>
</body>
</html>
