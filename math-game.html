<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学游戏 - 小游戏大全</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .game-area {
            width: 600px;
            height: 400px;
            margin: 20px auto;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5em;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
        }
        .math-question {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .question-text {
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .answer-input {
            font-size: 1.8em;
            padding: 15px;
            border: none;
            border-radius: 10px;
            text-align: center;
            width: 200px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        .submit-btn {
            font-size: 1.2em;
            padding: 12px 30px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
        .submit-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }
        .result-message {
            font-size: 1.3em;
            margin-top: 15px;
            font-weight: bold;
        }
        .timer-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }
        .timer-fill {
            height: 100%;
            background: #f39c12;
            transition: width 0.1s linear;
            width: 100%;
        }
        .difficulty-selector {
            margin-bottom: 20px;
        }
        .difficulty-btn {
            padding: 10px 20px;
            margin: 0 5px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
        }
        .difficulty-btn:hover, .difficulty-btn.active {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .controls {
            margin: 20px 0;
        }
        .game-btn {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1.1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .start-btn {
            background: #2ecc71;
            color: white;
        }
        .start-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-box {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">🏠 首页</a>
        <a href="#" class="active">➕ 数学游戏</a>
    </nav>
    
    <div class="game-container">
        <h1>➕ 数学游戏</h1>
        
        <div class="stats">
            <div class="stat-box">
                <div>得分</div>
                <div id="score">0</div>
            </div>
            <div class="stat-box">
                <div>等级</div>
                <div id="level">1</div>
            </div>
            <div class="stat-box">
                <div>时间</div>
                <div id="time">0</div>
            </div>
        </div>
        
        <div class="game-area" id="game-area">
            <div>点击开始游戏</div>
        </div>
        
        <div class="controls">
            <button onclick="startGame()" class="game-btn start-btn" id="start-btn">开始游戏</button>
            <button onclick="resetGame()" class="game-btn">重新开始</button>
            <button onclick="window.location.href='index.html'" class="game-btn">返回首页</button>
        </div>
    </div>
    
    <script>
        let score = 0;
        let level = 1;
        let gameActive = false;
        let startTime = 0;
        
        class MathGame {
            constructor() {
                this.score = 0;
                this.level = 1;
                this.currentQuestion = 0;
                this.totalQuestions = 10;
                this.gameActive = false;
                this.difficulty = 'easy';
                this.timeLimit = 30; // 每题30秒
                this.timeLeft = this.timeLimit;
                this.timer = null;
                this.correctAnswers = 0;
            }

            start(difficulty = 'easy') {
                this.difficulty = difficulty;
                this.gameActive = true;
                this.score = 0;
                this.level = 1;
                this.currentQuestion = 0;
                this.correctAnswers = 0;
                this.generateQuestion();
            }

            generateQuestion() {
                if (this.currentQuestion >= this.totalQuestions) {
                    this.endGame();
                    return;
                }

                let num1, num2, operator, question, answer;
                
                switch (this.difficulty) {
                    case 'easy':
                        num1 = Math.floor(Math.random() * 20) + 1;
                        num2 = Math.floor(Math.random() * 20) + 1;
                        operator = Math.random() < 0.5 ? '+' : '-';
                        if (operator === '-' && num1 < num2) {
                            [num1, num2] = [num2, num1];
                        }
                        break;
                    case 'medium':
                        num1 = Math.floor(Math.random() * 50) + 1;
                        num2 = Math.floor(Math.random() * 50) + 1;
                        const ops = ['+', '-', '×'];
                        operator = ops[Math.floor(Math.random() * ops.length)];
                        if (operator === '-' && num1 < num2) {
                            [num1, num2] = [num2, num1];
                        }
                        if (operator === '×') {
                            num1 = Math.floor(Math.random() * 12) + 1;
                            num2 = Math.floor(Math.random() * 12) + 1;
                        }
                        break;
                    case 'hard':
                        num1 = Math.floor(Math.random() * 100) + 1;
                        num2 = Math.floor(Math.random() * 100) + 1;
                        const hardOps = ['+', '-', '×', '÷'];
                        operator = hardOps[Math.floor(Math.random() * hardOps.length)];
                        if (operator === '-' && num1 < num2) {
                            [num1, num2] = [num2, num1];
                        }
                        if (operator === '×') {
                            num1 = Math.floor(Math.random() * 15) + 1;
                            num2 = Math.floor(Math.random() * 15) + 1;
                        }
                        if (operator === '÷') {
                            num2 = Math.floor(Math.random() * 12) + 1;
                            num1 = num2 * (Math.floor(Math.random() * 12) + 1);
                        }
                        break;
                }

                question = `${num1} ${operator} ${num2}`;
                
                switch (operator) {
                    case '+':
                        answer = num1 + num2;
                        break;
                    case '-':
                        answer = num1 - num2;
                        break;
                    case '×':
                        answer = num1 * num2;
                        break;
                    case '÷':
                        answer = num1 / num2;
                        break;
                }

                this.currentAnswer = answer;
                this.showQuestion(question);
                this.startTimer();
            }

            showQuestion(question) {
                const gameArea = document.getElementById('game-area');
                gameArea.innerHTML = `
                    <div class="math-question">
                        <div class="question-text">${question} = ?</div>
                        <input type="number" class="answer-input" id="answerInput" placeholder="输入答案" autofocus>
                        <br>
                        <button class="submit-btn" onclick="mathGame.checkAnswer()">提交答案</button>
                        <div class="result-message" id="resultMessage"></div>
                        <div class="timer-bar">
                            <div class="timer-fill" id="timerFill"></div>
                        </div>
                        <div style="margin-top: 10px; font-size: 0.9em;">
                            题目 ${this.currentQuestion + 1} / ${this.totalQuestions} | 时间: <span id="timeDisplay">${this.timeLimit}</span>s
                        </div>
                    </div>
                `;
                
                // 添加回车键提交功能
                document.getElementById('answerInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.checkAnswer();
                    }
                });
            }

            startTimer() {
                this.timeLeft = this.timeLimit;
                this.updateTimer();
                
                this.timer = setInterval(() => {
                    this.timeLeft--;
                    this.updateTimer();
                    
                    if (this.timeLeft <= 0) {
                        this.timeUp();
                    }
                }, 1000);
            }

            updateTimer() {
                const timeDisplay = document.getElementById('timeDisplay');
                const timerFill = document.getElementById('timerFill');
                
                if (timeDisplay) {
                    timeDisplay.textContent = this.timeLeft;
                }
                
                if (timerFill) {
                    const percentage = (this.timeLeft / this.timeLimit) * 100;
                    timerFill.style.width = percentage + '%';
                    
                    if (percentage < 30) {
                        timerFill.style.background = '#e74c3c';
                    } else if (percentage < 60) {
                        timerFill.style.background = '#f39c12';
                    } else {
                        timerFill.style.background = '#2ecc71';
                    }
                }
            }

            checkAnswer() {
                if (!this.gameActive) return;
                
                clearInterval(this.timer);
                
                const userAnswer = parseFloat(document.getElementById('answerInput').value);
                const resultMessage = document.getElementById('resultMessage');
                const submitBtn = document.querySelector('.submit-btn');
                
                if (submitBtn) submitBtn.disabled = true;
                
                if (userAnswer === this.currentAnswer) {
                    this.correctAnswers++;
                    const timeBonus = Math.floor(this.timeLeft / 3);
                    const points = 10 + timeBonus;
                    this.score += points;
                    
                    if (resultMessage) {
                        resultMessage.innerHTML = `🎉 正确！获得 ${points} 分`;
                        resultMessage.style.color = '#2ecc71';
                    }
                } else {
                    if (resultMessage) {
                        resultMessage.innerHTML = `❌ 错误！正确答案是 ${this.currentAnswer}`;
                        resultMessage.style.color = '#e74c3c';
                    }
                }
                
                this.level = Math.floor(this.currentQuestion / 3) + 1;
                this.updateStats();
                
                setTimeout(() => {
                    this.currentQuestion++;
                    this.generateQuestion();
                }, 2000);
            }

            timeUp() {
                clearInterval(this.timer);
                
                const resultMessage = document.getElementById('resultMessage');
                const submitBtn = document.querySelector('.submit-btn');
                
                if (submitBtn) submitBtn.disabled = true;
                
                if (resultMessage) {
                    resultMessage.innerHTML = `⏰ 时间到！正确答案是 ${this.currentAnswer}`;
                    resultMessage.style.color = '#f39c12';
                }
                
                setTimeout(() => {
                    this.currentQuestion++;
                    this.generateQuestion();
                }, 2000);
            }

            endGame() {
                this.gameActive = false;
                clearInterval(this.timer);
                
                const gameArea = document.getElementById('game-area');
                const percentage = Math.round((this.correctAnswers / this.totalQuestions) * 100);
                
                let message = '';
                if (percentage >= 90) {
                    message = '🏆 数学天才！';
                } else if (percentage >= 70) {
                    message = '🌟 数学高手！';
                } else if (percentage >= 50) {
                    message = '📚 继续努力！';
                } else {
                    message = '🔢 多多练习！';
                }
                
                gameArea.innerHTML = `
                    <div class="math-question">
                        <div class="question-text">游戏结束！</div>
                        <div style="font-size: 1.5em; margin: 20px 0;">${message}</div>
                        <div style="font-size: 1.2em;">最终得分: ${this.score}</div>
                        <div style="font-size: 1.1em; margin-top: 10px;">正确率: ${percentage}% (${this.correctAnswers}/${this.totalQuestions})</div>
                        <div class="difficulty-selector" style="margin-top: 20px;">
                            <div style="margin-bottom: 10px;">选择难度重新开始：</div>
                            <button class="difficulty-btn" onclick="mathGame.start('easy'); document.getElementById('start-btn').textContent = '游戏中...'; document.getElementById('start-btn').disabled = true;">简单</button>
                            <button class="difficulty-btn" onclick="mathGame.start('medium'); document.getElementById('start-btn').textContent = '游戏中...'; document.getElementById('start-btn').disabled = true;">中等</button>
                            <button class="difficulty-btn" onclick="mathGame.start('hard'); document.getElementById('start-btn').textContent = '游戏中...'; document.getElementById('start-btn').disabled = true;">困难</button>
                        </div>
                    </div>
                `;
                
                document.getElementById('start-btn').textContent = '开始游戏';
                document.getElementById('start-btn').disabled = false;
            }

            updateStats() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
            }
        }

        let mathGame;

        function startGame() {
            if (!mathGame) {
                mathGame = new MathGame();
            }
            
            gameActive = true;
            startTime = Date.now();
            
            // 显示难度选择
            const gameArea = document.getElementById('game-area');
            gameArea.innerHTML = `
                <div class="math-question">
                    <div class="question-text">选择难度</div>
                    <div class="difficulty-selector">
                        <button class="difficulty-btn" onclick="mathGame.start('easy'); document.getElementById('start-btn').textContent = '游戏中...'; document.getElementById('start-btn').disabled = true;">简单 (加减法)</button>
                        <button class="difficulty-btn" onclick="mathGame.start('medium'); document.getElementById('start-btn').textContent = '游戏中...'; document.getElementById('start-btn').disabled = true;">中等 (加减乘法)</button>
                        <button class="difficulty-btn" onclick="mathGame.start('hard'); document.getElementById('start-btn').textContent = '游戏中...'; document.getElementById('start-btn').disabled = true;">困难 (四则运算)</button>
                    </div>
                    <div style="margin-top: 20px; font-size: 0.9em; color: rgba(255,255,255,0.8);">
                        每题限时30秒，答题越快得分越高！
                    </div>
                </div>
            `;
            
            document.getElementById('start-btn').textContent = '选择难度...';
            document.getElementById('start-btn').disabled = true;
            
            score = mathGame.score;
            level = mathGame.level;
            
            updateStats();
        }
        
        function resetGame() {
            gameActive = false;
            score = 0;
            level = 1;
            startTime = 0;
            
            document.getElementById('start-btn').textContent = '开始游戏';
            document.getElementById('start-btn').disabled = false;
            document.getElementById('game-area').innerHTML = '<div>点击开始游戏</div>';
            
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            
            const timeElapsed = gameActive ? Math.floor((Date.now() - startTime) / 1000) : 0;
            document.getElementById('time').textContent = timeElapsed + 's';
        }
        
        // 定时更新时间显示
        setInterval(() => {
            if (gameActive) {
                updateStats();
            }
        }, 1000);
        
        // 游戏特定逻辑可以在这里添加
        console.log('数学游戏 已加载');
    </script>
</body>
</html>
