<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空入侵者 - 小游戏大全</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .game-area {
            width: 800px;
            height: 600px;
            margin: 20px auto;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: linear-gradient(180deg, #000428 0%, #004e92 100%);
            position: relative;
            overflow: hidden;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .controls {
            margin: 20px 0;
        }
        .game-btn {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1.1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .start-btn {
            background: #2ecc71;
            color: white;
        }
        .start-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-box {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 1000;
        }
        .instructions {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #2196f3;
        }
        .power-ups {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px 0;
        }
        .power-up {
            padding: 5px 10px;
            background: #ff9800;
            color: white;
            border-radius: 15px;
            font-size: 0.9em;
            opacity: 0.5;
        }
        .power-up.active {
            opacity: 1;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">🏠 首页</a>
        <a href="#" class="active">👾 太空入侵者</a>
    </nav>
    
    <div class="game-container">
        <h1>👾 太空入侵者</h1>
        
        <div class="instructions">
            <h3>游戏说明</h3>
            <p>使用 A/D 键或左右方向键移动飞船，空格键发射子弹</p>
            <p>消灭所有外星人，小心它们的攻击！收集道具获得特殊能力</p>
        </div>
        
        <div class="stats">
            <div class="stat-box">
                <div>得分</div>
                <div id="score">0</div>
            </div>
            <div class="stat-box">
                <div>关卡</div>
                <div id="level">1</div>
            </div>
            <div class="stat-box">
                <div>生命</div>
                <div id="lives">3</div>
            </div>
            <div class="stat-box">
                <div>外星人</div>
                <div id="aliens">0</div>
            </div>
            <div class="stat-box">
                <div>最高分</div>
                <div id="highScore">0</div>
            </div>
        </div>
        
        <div class="power-ups">
            <div class="power-up" id="rapidFire">🔥 快速射击</div>
            <div class="power-up" id="shield">🛡️ 护盾</div>
            <div class="power-up" id="multiShot">💥 多重射击</div>
        </div>
        
        <div class="game-area">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div class="game-over" id="gameOver">
                <h2 id="gameOverTitle">游戏结束</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <p>关卡: <span id="finalLevel">1</span></p>
                <button onclick="startGame()" class="game-btn start-btn">重新开始</button>
                <button onclick="window.location.href='index.html'" class="game-btn">返回首页</button>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="startGame()" class="game-btn start-btn" id="startBtn">开始游戏</button>
            <button onclick="pauseGame()" class="game-btn" id="pauseBtn">暂停</button>
            <button onclick="window.location.href='index.html'" class="game-btn">返回首页</button>
        </div>
    </div>
    
    <script>
        class SpaceInvaders {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.gameRunning = false;
                this.gamePaused = false;
                this.score = 0;
                this.level = 1;
                this.lives = 3;
                this.highScore = localStorage.getItem('spaceInvadersHighScore') || 0;
                
                this.player = {
                    x: this.canvas.width / 2 - 25,
                    y: this.canvas.height - 60,
                    width: 50,
                    height: 30,
                    speed: 5
                };
                
                this.bullets = [];
                this.aliens = [];
                this.alienBullets = [];
                this.powerUps = [];
                this.stars = [];
                
                this.keys = {};
                this.lastShot = 0;
                this.shotCooldown = 250;
                
                // 道具状态
                this.powerUpStates = {
                    rapidFire: { active: false, duration: 0 },
                    shield: { active: false, duration: 0 },
                    multiShot: { active: false, duration: 0 }
                };
                
                this.initEvents();
                this.generateStars();
                this.updateStats();
                this.draw();
            }
            
            initEvents() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    if (e.key === ' ' || e.key === 'Spacebar') {
                        e.preventDefault();
                        this.shoot();
                    }
                });
                
                document.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });
            }
            
            generateStars() {
                this.stars = [];
                for (let i = 0; i < 100; i++) {
                    this.stars.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        size: Math.random() * 2 + 1,
                        speed: Math.random() * 0.5 + 0.1
                    });
                }
            }
            
            generateAliens() {
                this.aliens = [];
                const rows = 5;
                const cols = 10;
                const alienWidth = 40;
                const alienHeight = 30;
                const spacing = 60;
                const startX = (this.canvas.width - (cols * spacing)) / 2;
                const startY = 50;
                
                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        this.aliens.push({
                            x: startX + col * spacing,
                            y: startY + row * spacing,
                            width: alienWidth,
                            height: alienHeight,
                            type: row < 2 ? 'fast' : row < 4 ? 'medium' : 'slow',
                            points: row < 2 ? 30 : row < 4 ? 20 : 10,
                            alive: true
                        });
                    }
                }
            }
            
            startGame() {
                this.gameRunning = true;
                this.gamePaused = false;
                this.score = 0;
                this.level = 1;
                this.lives = 3;
                this.bullets = [];
                this.alienBullets = [];
                this.powerUps = [];
                
                // 重置道具状态
                Object.keys(this.powerUpStates).forEach(key => {
                    this.powerUpStates[key] = { active: false, duration: 0 };
                });
                
                this.player.x = this.canvas.width / 2 - 25;
                this.generateAliens();
                
                document.getElementById('startBtn').textContent = '游戏中...';
                document.getElementById('startBtn').disabled = true;
                document.getElementById('gameOver').style.display = 'none';
                
                this.updateStats();
                this.gameLoop();
            }
            
            pauseGame() {
                if (!this.gameRunning) return;
                
                this.gamePaused = !this.gamePaused;
                document.getElementById('pauseBtn').textContent = this.gamePaused ? '继续' : '暂停';
                
                if (!this.gamePaused) {
                    this.gameLoop();
                }
            }
            
            gameLoop() {
                if (!this.gameRunning || this.gamePaused) return;
                
                this.update();
                this.draw();
                
                requestAnimationFrame(() => this.gameLoop());
            }
            
            update() {
                this.updatePlayer();
                this.updateBullets();
                this.updateAliens();
                this.updateAlienBullets();
                this.updatePowerUps();
                this.updatePowerUpStates();
                this.updateStars();
                this.checkCollisions();
                this.checkLevelComplete();
            }
            
            updatePlayer() {
                if (this.keys['ArrowLeft'] || this.keys['a'] || this.keys['A']) {
                    this.player.x = Math.max(0, this.player.x - this.player.speed);
                }
                if (this.keys['ArrowRight'] || this.keys['d'] || this.keys['D']) {
                    this.player.x = Math.min(this.canvas.width - this.player.width, this.player.x + this.player.speed);
                }
            }
            
            shoot() {
                if (!this.gameRunning || this.gamePaused) return;
                
                const now = Date.now();
                const cooldown = this.powerUpStates.rapidFire.active ? 100 : this.shotCooldown;
                
                if (now - this.lastShot < cooldown) return;
                
                this.lastShot = now;
                
                if (this.powerUpStates.multiShot.active) {
                    // 多重射击
                    for (let i = -1; i <= 1; i++) {
                        this.bullets.push({
                            x: this.player.x + this.player.width / 2 - 2 + i * 15,
                            y: this.player.y,
                            width: 4,
                            height: 10,
                            speed: 7
                        });
                    }
                } else {
                    // 普通射击
                    this.bullets.push({
                        x: this.player.x + this.player.width / 2 - 2,
                        y: this.player.y,
                        width: 4,
                        height: 10,
                        speed: 7
                    });
                }
            }
            
            updateBullets() {
                this.bullets = this.bullets.filter(bullet => {
                    bullet.y -= bullet.speed;
                    return bullet.y > -bullet.height;
                });
            }
            
            updateAliens() {
                let moveDown = false;
                let direction = 1;
                
                // 检查是否需要向下移动
                for (const alien of this.aliens) {
                    if (!alien.alive) continue;
                    if (alien.x <= 0 || alien.x >= this.canvas.width - alien.width) {
                        moveDown = true;
                        break;
                    }
                }
                
                for (const alien of this.aliens) {
                    if (!alien.alive) continue;
                    
                    if (moveDown) {
                        alien.y += 20;
                        direction *= -1;
                    } else {
                        alien.x += direction;
                    }
                    
                    // 外星人射击
                    if (Math.random() < 0.001) {
                        this.alienBullets.push({
                            x: alien.x + alien.width / 2 - 2,
                            y: alien.y + alien.height,
                            width: 4,
                            height: 8,
                            speed: 3
                        });
                    }
                }
            }
            
            updateAlienBullets() {
                this.alienBullets = this.alienBullets.filter(bullet => {
                    bullet.y += bullet.speed;
                    return bullet.y < this.canvas.height;
                });
            }
            
            updatePowerUps() {
                this.powerUps = this.powerUps.filter(powerUp => {
                    powerUp.y += powerUp.speed;
                    return powerUp.y < this.canvas.height;
                });
            }
            
            updatePowerUpStates() {
                Object.keys(this.powerUpStates).forEach(key => {
                    if (this.powerUpStates[key].active) {
                        this.powerUpStates[key].duration--;
                        if (this.powerUpStates[key].duration <= 0) {
                            this.powerUpStates[key].active = false;
                            document.getElementById(key).classList.remove('active');
                        }
                    }
                });
            }
            
            updateStars() {
                this.stars.forEach(star => {
                    star.y += star.speed;
                    if (star.y > this.canvas.height) {
                        star.y = 0;
                        star.x = Math.random() * this.canvas.width;
                    }
                });
            }
            
            checkCollisions() {
                // 子弹击中外星人
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const bullet = this.bullets[i];
                    for (const alien of this.aliens) {
                        if (alien.alive && this.isColliding(bullet, alien)) {
                            alien.alive = false;
                            this.bullets.splice(i, 1);
                            this.score += alien.points;
                            
                            // 随机生成道具
                            if (Math.random() < 0.1) {
                                this.spawnPowerUp(alien.x, alien.y);
                            }
                            
                            break;
                        }
                    }
                }
                
                // 外星人子弹击中玩家
                if (!this.powerUpStates.shield.active) {
                    for (let i = this.alienBullets.length - 1; i >= 0; i--) {
                        const bullet = this.alienBullets[i];
                        if (this.isColliding(bullet, this.player)) {
                            this.alienBullets.splice(i, 1);
                            this.lives--;
                            if (this.lives <= 0) {
                                this.gameOver();
                            }
                            break;
                        }
                    }
                }
                
                // 玩家收集道具
                for (let i = this.powerUps.length - 1; i >= 0; i--) {
                    const powerUp = this.powerUps[i];
                    if (this.isColliding(powerUp, this.player)) {
                        this.activatePowerUp(powerUp.type);
                        this.powerUps.splice(i, 1);
                        this.score += 25;
                    }
                }
                
                // 外星人到达底部
                for (const alien of this.aliens) {
                    if (alien.alive && alien.y + alien.height >= this.player.y) {
                        this.gameOver();
                        break;
                    }
                }
            }
            
            isColliding(rect1, rect2) {
                return rect1.x < rect2.x + rect2.width &&
                       rect1.x + rect1.width > rect2.x &&
                       rect1.y < rect2.y + rect2.height &&
                       rect1.y + rect1.height > rect2.y;
            }
            
            spawnPowerUp(x, y) {
                const types = ['rapidFire', 'shield', 'multiShot'];
                const type = types[Math.floor(Math.random() * types.length)];
                
                this.powerUps.push({
                    x: x,
                    y: y,
                    width: 20,
                    height: 20,
                    speed: 2,
                    type: type
                });
            }
            
            activatePowerUp(type) {
                this.powerUpStates[type] = { active: true, duration: 300 }; // 5秒
                document.getElementById(type).classList.add('active');
            }
            
            checkLevelComplete() {
                const aliveAliens = this.aliens.filter(alien => alien.alive);
                if (aliveAliens.length === 0) {
                    this.level++;
                    this.score += this.level * 100;
                    this.generateAliens();
                    this.updateStats();
                }
            }
            
            gameOver() {
                this.gameRunning = false;
                
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('spaceInvadersHighScore', this.highScore);
                }
                
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalLevel').textContent = this.level;
                document.getElementById('gameOverTitle').textContent = this.lives <= 0 ? '游戏结束' : '关卡完成';
                document.getElementById('gameOver').style.display = 'block';
                document.getElementById('startBtn').textContent = '开始游戏';
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').textContent = '暂停';
                
                this.updateStats();
            }
            
            updateStats() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lives').textContent = this.lives;
                document.getElementById('aliens').textContent = this.aliens.filter(alien => alien.alive).length;
                document.getElementById('highScore').textContent = this.highScore;
            }
            
            draw() {
                // 清空画布
                this.ctx.fillStyle = '#000428';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制星星
                this.ctx.fillStyle = 'white';
                this.stars.forEach(star => {
                    this.ctx.fillRect(star.x, star.y, star.size, star.size);
                });
                
                // 绘制玩家
                this.ctx.fillStyle = this.powerUpStates.shield.active ? '#00ff00' : '#00aaff';
                this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
                
                // 绘制玩家细节
                this.ctx.fillStyle = '#ffffff';
                this.ctx.fillRect(this.player.x + 20, this.player.y + 5, 10, 5);
                this.ctx.fillRect(this.player.x + 10, this.player.y + 15, 30, 5);
                
                // 绘制子弹
                this.ctx.fillStyle = '#ffff00';
                this.bullets.forEach(bullet => {
                    this.ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                });
                
                // 绘制外星人
                this.aliens.forEach(alien => {
                    if (!alien.alive) return;
                    
                    let color;
                    switch(alien.type) {
                        case 'fast': color = '#ff4444'; break;
                        case 'medium': color = '#44ff44'; break;
                        case 'slow': color = '#4444ff'; break;
                    }
                    
                    this.ctx.fillStyle = color;
                    this.ctx.fillRect(alien.x, alien.y, alien.width, alien.height);
                    
                    // 绘制外星人眼睛
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.fillRect(alien.x + 8, alien.y + 8, 6, 6);
                    this.ctx.fillRect(alien.x + 26, alien.y + 8, 6, 6);
                });
                
                // 绘制外星人子弹
                this.ctx.fillStyle = '#ff0000';
                this.alienBullets.forEach(bullet => {
                    this.ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
                });
                
                // 绘制道具
                this.powerUps.forEach(powerUp => {
                    this.ctx.fillStyle = '#ff9800';
                    this.ctx.fillRect(powerUp.x, powerUp.y, powerUp.width, powerUp.height);
                    
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.font = '12px Arial';
                    this.ctx.textAlign = 'center';
                    let symbol;
                    switch(powerUp.type) {
                        case 'rapidFire': symbol = 'F'; break;
                        case 'shield': symbol = 'S'; break;
                        case 'multiShot': symbol = 'M'; break;
                    }
                    this.ctx.fillText(symbol, powerUp.x + powerUp.width/2, powerUp.y + powerUp.height/2 + 4);
                });
                
                // 绘制暂停信息
                if (this.gamePaused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    
                    this.ctx.fillStyle = '#ffffff';
                    this.ctx.font = '48px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('游戏暂停', this.canvas.width/2, this.canvas.height/2);
                }
            }
        }
        
        let game;
        
        function startGame() {
            if (!game) {
                game = new SpaceInvaders();
            }
            game.startGame();
        }
        
        function pauseGame() {
            if (game) {
                game.pauseGame();
            }
        }
        
        // 初始化游戏
        document.addEventListener('DOMContentLoaded', () => {
            game = new SpaceInvaders();
        });
    </script>
</body>
</html>
