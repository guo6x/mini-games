<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吃豆人 - 小游戏大全</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .game-area {
            width: 600px;
            height: 600px;
            margin: 20px auto;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: #000;
            position: relative;
            overflow: hidden;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .controls {
            margin: 20px 0;
        }
        .game-btn {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1.1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .start-btn {
            background: #2ecc71;
            color: white;
        }
        .start-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-box {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 1000;
        }
        .instructions {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #2196f3;
        }
        .ghost-status {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 10px 0;
        }
        .ghost {
            padding: 5px 10px;
            border-radius: 15px;
            color: white;
            font-size: 0.9em;
        }
        .ghost.red { background: #ff0000; }
        .ghost.pink { background: #ffb8ff; }
        .ghost.cyan { background: #00ffff; }
        .ghost.orange { background: #ffb852; }
        .ghost.scared { background: #0000ff; animation: blink 0.5s infinite; }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">🏠 首页</a>
        <a href="#" class="active">🟡 吃豆人</a>
    </nav>
    
    <div class="game-container">
        <h1>🟡 吃豆人</h1>
        
        <div class="instructions">
            <h3>游戏说明</h3>
            <p>使用方向键控制吃豆人移动，吃掉所有小豆子！</p>
            <p>🟡 吃豆人 | ⚪ 小豆子 | 🔵 大豆子（让幽灵害怕） | 👻 幽灵</p>
        </div>
        
        <div class="stats">
            <div class="stat-box">
                <div>得分</div>
                <div id="score">0</div>
            </div>
            <div class="stat-box">
                <div>关卡</div>
                <div id="level">1</div>
            </div>
            <div class="stat-box">
                <div>生命</div>
                <div id="lives">3</div>
            </div>
            <div class="stat-box">
                <div>豆子</div>
                <div id="dots">0</div>
            </div>
        </div>
        
        <div class="ghost-status">
            <div class="ghost red" id="redGhost">红色幽灵</div>
            <div class="ghost pink" id="pinkGhost">粉色幽灵</div>
            <div class="ghost cyan" id="cyanGhost">青色幽灵</div>
            <div class="ghost orange" id="orangeGhost">橙色幽灵</div>
        </div>
        
        <div class="game-area">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            <div class="game-over" id="gameOver">
                <h2 id="gameOverTitle">游戏结束</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <p>关卡: <span id="finalLevel">1</span></p>
                <button onclick="startGame()" class="game-btn start-btn">重新开始</button>
                <button onclick="window.location.href='index.html'" class="game-btn">返回首页</button>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="startGame()" class="game-btn start-btn" id="startBtn">开始游戏</button>
            <button onclick="pauseGame()" class="game-btn" id="pauseBtn">暂停</button>
            <button onclick="window.location.href='index.html'" class="game-btn">返回首页</button>
        </div>
    </div>
    
    <script>
        class PacManGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.gameRunning = false;
                this.gamePaused = false;
                this.score = 0;
                this.level = 1;
                this.lives = 3;
                
                this.cellSize = 20;
                this.rows = 30;
                this.cols = 30;
                
                // 游戏地图 (0=空, 1=墙, 2=豆子, 3=大豆子)
                this.maze = [];
                this.originalMaze = [];
                
                this.pacman = {
                    x: 14,
                    y: 23,
                    direction: 0, // 0=右, 1=下, 2=左, 3=上
                    nextDirection: 0,
                    mouthOpen: true
                };
                
                this.ghosts = [
                    { x: 14, y: 11, direction: 0, color: '#ff0000', scared: false, scaredTime: 0 },
                    { x: 13, y: 13, direction: 1, color: '#ffb8ff', scared: false, scaredTime: 0 },
                    { x: 15, y: 13, direction: 2, color: '#00ffff', scared: false, scaredTime: 0 },
                    { x: 14, y: 13, direction: 3, color: '#ffb852', scared: false, scaredTime: 0 }
                ];
                
                this.keys = {};
                this.lastUpdate = 0;
                this.gameSpeed = 150;
                this.mouthTimer = 0;
                
                this.initEvents();
                this.generateMaze();
                this.updateStats();
                this.draw();
            }
            
            initEvents() {
                document.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    this.handleInput(e.key);
                });
                
                document.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });
            }
            
            handleInput(key) {
                if (!this.gameRunning || this.gamePaused) return;
                
                switch(key) {
                    case 'ArrowRight':
                        this.pacman.nextDirection = 0;
                        break;
                    case 'ArrowDown':
                        this.pacman.nextDirection = 1;
                        break;
                    case 'ArrowLeft':
                        this.pacman.nextDirection = 2;
                        break;
                    case 'ArrowUp':
                        this.pacman.nextDirection = 3;
                        break;
                }
            }
            
            generateMaze() {
                // 创建简单的迷宫布局
                this.maze = Array(this.rows).fill().map(() => Array(this.cols).fill(0));
                
                // 外墙
                for (let i = 0; i < this.rows; i++) {
                    this.maze[i][0] = 1;
                    this.maze[i][this.cols - 1] = 1;
                }
                for (let j = 0; j < this.cols; j++) {
                    this.maze[0][j] = 1;
                    this.maze[this.rows - 1][j] = 1;
                }
                
                // 内部墙壁
                for (let i = 2; i < this.rows - 2; i += 4) {
                    for (let j = 2; j < this.cols - 2; j += 4) {
                        this.maze[i][j] = 1;
                        this.maze[i][j + 1] = 1;
                        this.maze[i + 1][j] = 1;
                    }
                }
                
                // 幽灵房间
                for (let i = 10; i < 16; i++) {
                    for (let j = 12; j < 18; j++) {
                        if (i === 10 || i === 15 || j === 12 || j === 17) {
                            this.maze[i][j] = 1;
                        } else {
                            this.maze[i][j] = 0;
                        }
                    }
                }
                
                // 幽灵房间入口
                this.maze[10][14] = 0;
                this.maze[10][15] = 0;
                
                // 放置豆子
                for (let i = 1; i < this.rows - 1; i++) {
                    for (let j = 1; j < this.cols - 1; j++) {
                        if (this.maze[i][j] === 0) {
                            // 大豆子位置
                            if ((i === 3 && j === 3) || (i === 3 && j === this.cols - 4) ||
                                (i === this.rows - 4 && j === 3) || (i === this.rows - 4 && j === this.cols - 4)) {
                                this.maze[i][j] = 3;
                            } else if (!(i >= 11 && i <= 14 && j >= 13 && j <= 16) && // 不在幽灵房间
                                      !(i === 23 && j === 14)) { // 不在吃豆人起始位置
                                this.maze[i][j] = 2;
                            }
                        }
                    }
                }
                
                this.originalMaze = this.maze.map(row => [...row]);
            }
            
            startGame() {
                this.gameRunning = true;
                this.gamePaused = false;
                this.score = 0;
                this.level = 1;
                this.lives = 3;
                
                // 重置迷宫
                this.maze = this.originalMaze.map(row => [...row]);
                
                // 重置吃豆人位置
                this.pacman = {
                    x: 14,
                    y: 23,
                    direction: 0,
                    nextDirection: 0,
                    mouthOpen: true
                };
                
                // 重置幽灵位置
                this.ghosts = [
                    { x: 14, y: 11, direction: 0, color: '#ff0000', scared: false, scaredTime: 0 },
                    { x: 13, y: 13, direction: 1, color: '#ffb8ff', scared: false, scaredTime: 0 },
                    { x: 15, y: 13, direction: 2, color: '#00ffff', scared: false, scaredTime: 0 },
                    { x: 14, y: 13, direction: 3, color: '#ffb852', scared: false, scaredTime: 0 }
                ];
                
                document.getElementById('startBtn').textContent = '游戏中...';
                document.getElementById('startBtn').disabled = true;
                document.getElementById('gameOver').style.display = 'none';
                
                this.updateStats();
                this.lastUpdate = Date.now();
                this.gameLoop();
            }
            
            pauseGame() {
                if (!this.gameRunning) return;
                
                this.gamePaused = !this.gamePaused;
                document.getElementById('pauseBtn').textContent = this.gamePaused ? '继续' : '暂停';
                
                if (!this.gamePaused) {
                    this.lastUpdate = Date.now();
                    this.gameLoop();
                }
            }
            
            gameLoop() {
                if (!this.gameRunning || this.gamePaused) return;
                
                const now = Date.now();
                if (now - this.lastUpdate > this.gameSpeed) {
                    this.update();
                    this.lastUpdate = now;
                }
                
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
            
            update() {
                this.updatePacman();
                this.updateGhosts();
                this.checkCollisions();
                this.checkWin();
                
                // 更新嘴巴动画
                this.mouthTimer++;
                if (this.mouthTimer % 10 === 0) {
                    this.pacman.mouthOpen = !this.pacman.mouthOpen;
                }
            }
            
            updatePacman() {
                // 检查是否可以转向
                const nextX = this.pacman.x + this.getDirectionX(this.pacman.nextDirection);
                const nextY = this.pacman.y + this.getDirectionY(this.pacman.nextDirection);
                
                if (this.isValidMove(nextX, nextY)) {
                    this.pacman.direction = this.pacman.nextDirection;
                }
                
                // 移动吃豆人
                const moveX = this.pacman.x + this.getDirectionX(this.pacman.direction);
                const moveY = this.pacman.y + this.getDirectionY(this.pacman.direction);
                
                if (this.isValidMove(moveX, moveY)) {
                    this.pacman.x = moveX;
                    this.pacman.y = moveY;
                    
                    // 处理隧道效果
                    if (this.pacman.x < 0) this.pacman.x = this.cols - 1;
                    if (this.pacman.x >= this.cols) this.pacman.x = 0;
                    
                    // 吃豆子
                    if (this.maze[this.pacman.y][this.pacman.x] === 2) {
                        this.maze[this.pacman.y][this.pacman.x] = 0;
                        this.score += 10;
                    } else if (this.maze[this.pacman.y][this.pacman.x] === 3) {
                        this.maze[this.pacman.y][this.pacman.x] = 0;
                        this.score += 50;
                        this.scareGhosts();
                    }
                }
            }
            
            updateGhosts() {
                this.ghosts.forEach((ghost, index) => {
                    // 更新害怕状态
                    if (ghost.scared) {
                        ghost.scaredTime--;
                        if (ghost.scaredTime <= 0) {
                            ghost.scared = false;
                            this.updateGhostDisplay(index);
                        }
                    }
                    
                    // 简单的AI移动
                    const directions = [0, 1, 2, 3];
                    let validDirections = [];
                    
                    for (const dir of directions) {
                        const newX = ghost.x + this.getDirectionX(dir);
                        const newY = ghost.y + this.getDirectionY(dir);
                        
                        if (this.isValidMove(newX, newY) || (newX >= 12 && newX <= 17 && newY >= 11 && newY <= 15)) {
                            validDirections.push(dir);
                        }
                    }
                    
                    if (validDirections.length > 0) {
                        // 如果害怕，远离吃豆人；否则追逐吃豆人
                        if (ghost.scared) {
                            // 选择远离吃豆人的方向
                            let bestDir = validDirections[0];
                            let maxDistance = 0;
                            
                            for (const dir of validDirections) {
                                const newX = ghost.x + this.getDirectionX(dir);
                                const newY = ghost.y + this.getDirectionY(dir);
                                const distance = Math.abs(newX - this.pacman.x) + Math.abs(newY - this.pacman.y);
                                
                                if (distance > maxDistance) {
                                    maxDistance = distance;
                                    bestDir = dir;
                                }
                            }
                            
                            ghost.direction = bestDir;
                        } else {
                            // 选择接近吃豆人的方向
                            let bestDir = validDirections[0];
                            let minDistance = Infinity;
                            
                            for (const dir of validDirections) {
                                const newX = ghost.x + this.getDirectionX(dir);
                                const newY = ghost.y + this.getDirectionY(dir);
                                const distance = Math.abs(newX - this.pacman.x) + Math.abs(newY - this.pacman.y);
                                
                                if (distance < minDistance) {
                                    minDistance = distance;
                                    bestDir = dir;
                                }
                            }
                            
                            ghost.direction = bestDir;
                        }
                        
                        // 移动幽灵
                        ghost.x += this.getDirectionX(ghost.direction);
                        ghost.y += this.getDirectionY(ghost.direction);
                        
                        // 处理隧道效果
                        if (ghost.x < 0) ghost.x = this.cols - 1;
                        if (ghost.x >= this.cols) ghost.x = 0;
                    }
                });
            }
            
            getDirectionX(direction) {
                return [1, 0, -1, 0][direction];
            }
            
            getDirectionY(direction) {
                return [0, 1, 0, -1][direction];
            }
            
            isValidMove(x, y) {
                if (x < 0 || x >= this.cols || y < 0 || y >= this.rows) {
                    return x < 0 || x >= this.cols; // 允许水平隧道
                }
                return this.maze[y][x] !== 1;
            }
            
            scareGhosts() {
                this.ghosts.forEach((ghost, index) => {
                    ghost.scared = true;
                    ghost.scaredTime = 200; // 约13秒
                    this.updateGhostDisplay(index);
                });
            }
            
            updateGhostDisplay(index) {
                const ghostElements = ['redGhost', 'pinkGhost', 'cyanGhost', 'orangeGhost'];
                const element = document.getElementById(ghostElements[index]);
                
                if (this.ghosts[index].scared) {
                    element.className = 'ghost scared';
                } else {
                    const colors = ['red', 'pink', 'cyan', 'orange'];
                    element.className = `ghost ${colors[index]}`;
                }
            }
            
            checkCollisions() {
                this.ghosts.forEach(ghost => {
                    if (ghost.x === this.pacman.x && ghost.y === this.pacman.y) {
                        if (ghost.scared) {
                            // 吃掉害怕的幽灵
                            this.score += 200;
                            ghost.x = 14;
                            ghost.y = 13;
                            ghost.scared = false;
                            ghost.scaredTime = 0;
                        } else {
                            // 被幽灵抓住
                            this.lives--;
                            if (this.lives <= 0) {
                                this.gameOver();
                            } else {
                                this.resetPositions();
                            }
                        }
                    }
                });
            }
            
            resetPositions() {
                this.pacman.x = 14;
                this.pacman.y = 23;
                this.pacman.direction = 0;
                this.pacman.nextDirection = 0;
                
                this.ghosts.forEach((ghost, index) => {
                    ghost.x = 14 + (index - 1.5) * (index % 2 === 0 ? 1 : -1);
                    ghost.y = 13;
                    ghost.scared = false;
                    ghost.scaredTime = 0;
                    this.updateGhostDisplay(index);
                });
            }
            
            checkWin() {
                let dotsRemaining = 0;
                for (let i = 0; i < this.rows; i++) {
                    for (let j = 0; j < this.cols; j++) {
                        if (this.maze[i][j] === 2 || this.maze[i][j] === 3) {
                            dotsRemaining++;
                        }
                    }
                }
                
                if (dotsRemaining === 0) {
                    this.level++;
                    this.score += this.level * 1000;
                    this.generateMaze();
                    this.resetPositions();
                    this.gameSpeed = Math.max(50, this.gameSpeed - 10);
                }
                
                this.updateStats();
            }
            
            gameOver() {
                this.gameRunning = false;
                
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalLevel').textContent = this.level;
                document.getElementById('gameOverTitle').textContent = '游戏结束';
                document.getElementById('gameOver').style.display = 'block';
                document.getElementById('startBtn').textContent = '开始游戏';
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').textContent = '暂停';
            }
            
            updateStats() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lives').textContent = this.lives;
                
                let dotsRemaining = 0;
                for (let i = 0; i < this.rows; i++) {
                    for (let j = 0; j < this.cols; j++) {
                        if (this.maze[i][j] === 2 || this.maze[i][j] === 3) {
                            dotsRemaining++;
                        }
                    }
                }
                document.getElementById('dots').textContent = dotsRemaining;
            }
            
            draw() {
                // 清空画布
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制迷宫
                for (let i = 0; i < this.rows; i++) {
                    for (let j = 0; j < this.cols; j++) {
                        const x = j * this.cellSize;
                        const y = i * this.cellSize;
                        
                        switch(this.maze[i][j]) {
                            case 1: // 墙
                                this.ctx.fillStyle = '#0000ff';
                                this.ctx.fillRect(x, y, this.cellSize, this.cellSize);
                                break;
                            case 2: // 小豆子
                                this.ctx.fillStyle = '#ffff00';
                                this.ctx.beginPath();
                                this.ctx.arc(x + this.cellSize/2, y + this.cellSize/2, 2, 0, Math.PI * 2);
                                this.ctx.fill();
                                break;
                            case 3: // 大豆子
                                this.ctx.fillStyle = '#ffff00';
                                this.ctx.beginPath();
                                this.ctx.arc(x + this.cellSize/2, y + this.cellSize/2, 6, 0, Math.PI * 2);
                                this.ctx.fill();
                                break;
                        }
                    }
                }
                
                // 绘制吃豆人
                const pacX = this.pacman.x * this.cellSize + this.cellSize/2;
                const pacY = this.pacman.y * this.cellSize + this.cellSize/2;
                
                this.ctx.fillStyle = '#ffff00';
                this.ctx.beginPath();
                
                if (this.pacman.mouthOpen) {
                    const startAngle = this.pacman.direction * Math.PI/2 + Math.PI/6;
                    const endAngle = this.pacman.direction * Math.PI/2 - Math.PI/6;
                    this.ctx.arc(pacX, pacY, this.cellSize/2 - 2, startAngle, endAngle);
                    this.ctx.lineTo(pacX, pacY);
                } else {
                    this.ctx.arc(pacX, pacY, this.cellSize/2 - 2, 0, Math.PI * 2);
                }
                
                this.ctx.fill();
                
                // 绘制幽灵
                this.ghosts.forEach(ghost => {
                    const ghostX = ghost.x * this.cellSize + this.cellSize/2;
                    const ghostY = ghost.y * this.cellSize + this.cellSize/2;
                    
                    this.ctx.fillStyle = ghost.scared ? '#0000ff' : ghost.color;
                    this.ctx.beginPath();
                    this.ctx.arc(ghostX, ghostY, this.cellSize/2 - 2, Math.PI, 0);
                    this.ctx.lineTo(ghostX + this.cellSize/2 - 2, ghostY + this.cellSize/2 - 2);
                    this.ctx.lineTo(ghostX + this.cellSize/4, ghostY + this.cellSize/4);
                    this.ctx.lineTo(ghostX, ghostY + this.cellSize/2 - 2);
                    this.ctx.lineTo(ghostX - this.cellSize/4, ghostY + this.cellSize/4);
                    this.ctx.lineTo(ghostX - this.cellSize/2 + 2, ghostY + this.cellSize/2 - 2);
                    this.ctx.closePath();
                    this.ctx.fill();
                    
                    // 绘制眼睛
                    this.ctx.fillStyle = '#fff';
                    this.ctx.beginPath();
                    this.ctx.arc(ghostX - 4, ghostY - 2, 2, 0, Math.PI * 2);
                    this.ctx.arc(ghostX + 4, ghostY - 2, 2, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    if (!ghost.scared) {
                        this.ctx.fillStyle = '#000';
                        this.ctx.beginPath();
                        this.ctx.arc(ghostX - 4, ghostY - 2, 1, 0, Math.PI * 2);
                        this.ctx.arc(ghostX + 4, ghostY - 2, 1, 0, Math.PI * 2);
                        this.ctx.fill();
                    }
                });
                
                // 绘制暂停信息
                if (this.gamePaused) {
                    this.ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    
                    this.ctx.fillStyle = '#ffff00';
                    this.ctx.font = '48px Arial';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('游戏暂停', this.canvas.width/2, this.canvas.height/2);
                }
            }
        }
        
        let game;
        
        function startGame() {
            if (!game) {
                game = new PacManGame();
            }
            game.startGame();
        }
        
        function pauseGame() {
            if (game) {
                game.pauseGame();
            }
        }
        
        // 初始化游戏
        document.addEventListener('DOMContentLoaded', () => {
            game = new PacManGame();
        });
    </script>
</body>
</html>
