<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钓鱼游戏 - 小游戏大全</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .game-area {
            width: 800px;
            height: 500px;
            margin: 20px auto;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: linear-gradient(135deg, #87ceeb 0%, #4682b4 100%);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .water-surface {
            flex: 1;
            background: linear-gradient(180deg, #87ceeb 0%, #4682b4 50%, #191970 100%);
            position: relative;
            cursor: crosshair;
        }
        .fishing-line {
            position: absolute;
            width: 2px;
            background: #8b4513;
            transform-origin: top;
            transition: all 0.3s ease;
            display: none;
        }
        .hook {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #c0c0c0;
            border-radius: 50%;
            display: none;
        }
        .fish {
            position: absolute;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.5s ease;
            animation: swim 3s infinite linear;
        }
        @keyframes swim {
            0% { transform: translateX(-50px); }
            100% { transform: translateX(850px); }
        }
        .fishing-rod {
            position: absolute;
            bottom: 20px;
            left: 50px;
            width: 200px;
            height: 10px;
            background: #8b4513;
            border-radius: 5px;
            transform-origin: left;
            transform: rotate(-30deg);
        }
        .control-panel {
            height: 100px;
            background: #f4f4f4;
            border-top: 2px solid #ddd;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
        }
        .cast-button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .cast-button:hover {
            background: #0056b3;
        }
        .cast-button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .fishing-stats {
            display: flex;
            gap: 20px;
            margin-left: auto;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            background: white;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-weight: bold;
        }
        .catch-notification {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            font-size: 18px;
            display: none;
            z-index: 100;
        }
        .controls {
            margin: 20px 0;
        }
        .game-btn {
            padding: 10px 20px;
            margin: 5px;
            font-size: 1.1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .start-btn {
            background: #2ecc71;
            color: white;
        }
        .start-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .stat-box {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">🏠 首页</a>
        <a href="#" class="active">🎣 钓鱼游戏</a>
    </nav>
    
    <div class="game-container">
        <h1>🎣 钓鱼游戏</h1>
        
        <div class="stats">
            <div class="stat-box">
                <div>得分</div>
                <div id="score">0</div>
            </div>
            <div class="stat-box">
                <div>等级</div>
                <div id="level">1</div>
            </div>
            <div class="stat-box">
                <div>时间</div>
                <div id="time">0</div>
            </div>
        </div>
        
        <div class="game-area" id="game-area">
            <div class="water-surface" id="waterSurface">
                <div class="fishing-rod" id="fishingRod"></div>
                <div class="fishing-line" id="fishingLine"></div>
                <div class="hook" id="hook"></div>
                <div class="catch-notification" id="catchNotification"></div>
            </div>
            <div class="control-panel">
                <button class="cast-button" id="castButton">抛竿</button>
                <div class="fishing-stats">
                    <div class="stat-item">
                        <span>🐟</span>
                        <span id="fishCaught">0</span>
                    </div>
                    <div class="stat-item">
                        <span>⭐</span>
                        <span id="fishingScore">0</span>
                    </div>
                    <div class="stat-item">
                        <span>🎣</span>
                        <span id="baitLeft">10</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="startGame()" class="game-btn start-btn" id="start-btn">开始游戏</button>
            <button onclick="resetGame()" class="game-btn">重新开始</button>
            <button onclick="window.location.href='index.html'" class="game-btn">返回首页</button>
        </div>
    </div>
    
    <script>
        let score = 0;
        let level = 1;
        let gameActive = false;
        let startTime = 0;
        
        class FishingGame {
            constructor() {
                this.score = 0;
                this.level = 1;
                this.timeLeft = 300;
                this.gameRunning = false;
                this.fishCaught = 0;
                this.baitLeft = 10;
                this.isCasting = false;
                this.fishInWater = [];
                this.fishTypes = [
                    { emoji: '🐟', name: '小鱼', points: 10, rarity: 0.6 },
                    { emoji: '🐠', name: '热带鱼', points: 20, rarity: 0.3 },
                    { emoji: '🐡', name: '河豚', points: 30, rarity: 0.15 },
                    { emoji: '🦈', name: '鲨鱼', points: 50, rarity: 0.05 },
                    { emoji: '🐙', name: '章鱼', points: 40, rarity: 0.08 },
                    { emoji: '🦞', name: '龙虾', points: 35, rarity: 0.1 }
                ];
                this.init();
            }

            init() {
                this.bindEvents();
                this.updateDisplay();
            }

            bindEvents() {
                const castButton = document.getElementById('castButton');
                const waterSurface = document.getElementById('waterSurface');
                
                if (castButton) {
                    castButton.addEventListener('click', () => {
                        this.castLine();
                    });
                }
                
                if (waterSurface) {
                    waterSurface.addEventListener('click', (e) => {
                        if (this.isCasting) {
                            this.tryToCatch(e);
                        }
                    });
                }
            }

            spawnFish() {
                if (!this.gameRunning) return;
                
                if (Math.random() < 0.3 && this.fishInWater.length < 5) {
                    const fishType = this.getRandomFish();
                    const fish = document.createElement('div');
                    fish.className = 'fish';
                    fish.innerHTML = fishType.emoji;
                    fish.dataset.points = fishType.points;
                    fish.dataset.name = fishType.name;
                    
                    const waterSurface = document.getElementById('waterSurface');
                    const randomY = Math.random() * (waterSurface.clientHeight - 50) + 25;
                    
                    fish.style.top = randomY + 'px';
                    fish.style.left = '-50px';
                    
                    waterSurface.appendChild(fish);
                    this.fishInWater.push(fish);
                    
                    setTimeout(() => {
                        if (fish.parentNode) {
                            fish.parentNode.removeChild(fish);
                            const index = this.fishInWater.indexOf(fish);
                            if (index > -1) {
                                this.fishInWater.splice(index, 1);
                            }
                        }
                    }, 3000);
                }
                
                setTimeout(() => this.spawnFish(), 1000 + Math.random() * 2000);
            }

            getRandomFish() {
                const rand = Math.random();
                let cumulativeRarity = 0;
                
                for (const fishType of this.fishTypes) {
                    cumulativeRarity += fishType.rarity;
                    if (rand <= cumulativeRarity) {
                        return fishType;
                    }
                }
                
                return this.fishTypes[0];
            }

            castLine() {
                if (this.isCasting || this.baitLeft <= 0 || !this.gameRunning) return;
                
                this.isCasting = true;
                this.baitLeft--;
                
                const castButton = document.getElementById('castButton');
                const fishingLine = document.getElementById('fishingLine');
                const hook = document.getElementById('hook');
                
                if (castButton) {
                    castButton.disabled = true;
                    castButton.textContent = '等待咬钩...';
                }
                
                if (fishingLine) {
                    fishingLine.style.display = 'block';
                    fishingLine.style.left = '250px';
                    fishingLine.style.top = '70px';
                    fishingLine.style.height = '200px';
                }
                
                if (hook) {
                    hook.style.display = 'block';
                    hook.style.left = '245px';
                    hook.style.top = '265px';
                }
                
                setTimeout(() => {
                    this.reelIn();
                }, 5000);
                
                this.updateDisplay();
            }

            tryToCatch(event) {
                if (!this.isCasting) return;
                
                const rect = event.currentTarget.getBoundingClientRect();
                const clickX = event.clientX - rect.left;
                const clickY = event.clientY - rect.top;
                
                const fish = this.fishInWater.find(f => {
                    const fishRect = f.getBoundingClientRect();
                    const fishX = fishRect.left - rect.left;
                    const fishY = fishRect.top - rect.top;
                    
                    return Math.abs(clickX - fishX) < 30 && Math.abs(clickY - fishY) < 30;
                });
                
                if (fish) {
                    this.catchFish(fish);
                } else {
                    this.reelIn();
                }
            }

            catchFish(fish) {
                const points = parseInt(fish.dataset.points);
                const name = fish.dataset.name;
                
                this.fishCaught++;
                this.score += points;
                this.level = Math.floor(this.fishCaught / 5) + 1;
                
                const notification = document.getElementById('catchNotification');
                if (notification) {
                    notification.innerHTML = `🎉 捕获了 ${fish.innerHTML} ${name}！<br>获得 ${points} 分！`;
                    notification.style.display = 'block';
                    
                    setTimeout(() => {
                        notification.style.display = 'none';
                    }, 2000);
                }
                
                if (fish.parentNode) {
                    fish.parentNode.removeChild(fish);
                    const index = this.fishInWater.indexOf(fish);
                    if (index > -1) {
                        this.fishInWater.splice(index, 1);
                    }
                }
                
                this.reelIn();
                this.updateDisplay();
            }

            reelIn() {
                this.isCasting = false;
                
                const castButton = document.getElementById('castButton');
                const fishingLine = document.getElementById('fishingLine');
                const hook = document.getElementById('hook');
                
                if (castButton) {
                    castButton.disabled = false;
                    castButton.textContent = '抛竿';
                }
                
                if (fishingLine) fishingLine.style.display = 'none';
                if (hook) hook.style.display = 'none';
            }

            updateDisplay() {
                const scoreEl = document.getElementById('score');
                const levelEl = document.getElementById('level');
                const fishCaughtEl = document.getElementById('fishCaught');
                const fishingScoreEl = document.getElementById('fishingScore');
                const baitLeftEl = document.getElementById('baitLeft');
                
                if (scoreEl) scoreEl.textContent = this.score;
                if (levelEl) levelEl.textContent = this.level;
                if (fishCaughtEl) fishCaughtEl.textContent = this.fishCaught;
                if (fishingScoreEl) fishingScoreEl.textContent = this.score;
                if (baitLeftEl) baitLeftEl.textContent = this.baitLeft;
            }
        }
        
        let fishingGame;
        
        function startGame() {
            if (!fishingGame) {
                fishingGame = new FishingGame();
            }
            
            fishingGame.gameRunning = true;
            gameActive = true;
            startTime = Date.now();
            score = fishingGame.score;
            level = fishingGame.level;
            
            document.getElementById('start-btn').textContent = '游戏中...';
            document.getElementById('start-btn').disabled = true;
            
            fishingGame.spawnFish();
            
            setInterval(() => {
                if (fishingGame.gameRunning && fishingGame.baitLeft < 3) {
                    fishingGame.baitLeft += 2;
                    fishingGame.updateDisplay();
                }
            }, 15000);
            
            updateStats();
        }
        
        function resetGame() {
            gameActive = false;
            score = 0;
            level = 1;
            startTime = 0;
            
            document.getElementById('start-btn').textContent = '开始游戏';
            document.getElementById('start-btn').disabled = false;
            document.getElementById('game-area').innerHTML = '<div>点击开始游戏</div>';
            
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            
            const timeElapsed = gameActive ? Math.floor((Date.now() - startTime) / 1000) : 0;
            document.getElementById('time').textContent = timeElapsed + 's';
        }
        
        // 定时更新时间显示
        setInterval(() => {
            if (gameActive) {
                updateStats();
            }
        }, 1000);
        
        // 游戏特定逻辑可以在这里添加
        console.log('钓鱼游戏 已加载');
    </script>
</body>
</html>
